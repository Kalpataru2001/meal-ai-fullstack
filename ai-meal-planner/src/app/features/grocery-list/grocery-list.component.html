<div class="max-w-4xl mx-auto h-full flex flex-col animate-fade-in">
  
  <div class="mb-8 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold text-gray-900 dark:text-gray-100 tracking-tight flex items-center gap-3">
        <lucide-icon [img]="icons.ShoppingCart" size="32" class="text-accent"></lucide-icon>
        Grocery List
      </h1>
      <p class="text-gray-500 dark:text-gray-400 mt-1">Check off items as you shop.</p>
    </div>

    <div class="w-full sm:w-64 bg-card-light dark:bg-card-dark border border-gray-200 dark:border-gray-800 rounded-xl p-3 shadow-sm">
      <div class="flex justify-between text-xs font-semibold mb-2">
        <span class="text-gray-500 dark:text-gray-400">Shopping Progress</span>
        <span class="text-accent">{{ progress() }}%</span>
      </div>
      <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 overflow-hidden">
        <div class="bg-accent h-2 rounded-full transition-all duration-500 ease-out" [style.width.%]="progress()"></div>
      </div>
    </div>
  </div>

  <form [formGroup]="addForm" (ngSubmit)="addItem()" class="mb-8 relative shadow-sm">
    <input 
      type="text" 
      formControlName="name"
      placeholder="Add an item (e.g., Almond milk)..." 
      class="w-full pl-5 pr-14 py-4 bg-white dark:bg-card-dark border border-gray-200 dark:border-gray-800 rounded-2xl text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-accent outline-none transition-shadow text-lg"
    >
    <button 
      type="submit" 
      [disabled]="addForm.invalid"
      class="absolute right-2 top-2 bottom-2 aspect-square bg-accent text-white rounded-xl flex items-center justify-center hover:bg-accent/90 disabled:opacity-50 transition-colors">
      <lucide-icon [img]="icons.Plus" size="24"></lucide-icon>
    </button>
  </form>

  <div *ngIf="isLoading()" class="space-y-3">
    <div *ngFor="let i of [1,2,3]" class="h-16 bg-gray-200 dark:bg-gray-800 rounded-2xl animate-pulse"></div>
  </div>

  <div *ngIf="!isLoading()" class="space-y-8 pb-12">
    
    <div *ngIf="activeItems().length > 0" class="space-y-3">
      <h3 class="text-sm font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 ml-2">To Buy ({{ activeItems().length }})</h3>
      
      <div *ngFor="let item of activeItems()" class="flex items-center justify-between p-4 bg-card-light dark:bg-card-dark border border-gray-200 dark:border-gray-800 rounded-2xl shadow-sm group hover:border-accent/30 transition-colors">
        <div class="flex items-center gap-4 flex-1 cursor-pointer" (click)="toggleItem(item)">
          <button class="text-gray-300 dark:text-gray-600 hover:text-accent transition-colors">
            <lucide-icon [img]="icons.Circle" size="24"></lucide-icon>
          </button>
          <span class="text-lg font-medium text-gray-900 dark:text-gray-100 capitalize">{{ item.name }}</span>
        </div>
        <button (click)="deleteItem(item.id)" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg opacity-0 group-hover:opacity-100 transition-all">
          <lucide-icon [img]="icons.Trash2" size="18"></lucide-icon>
        </button>
      </div>
    </div>

    <div *ngIf="items().length === 0" class="text-center py-12">
      <div class="w-16 h-16 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-400">
        <lucide-icon [img]="icons.ShoppingCart" size="24"></lucide-icon>
      </div>
      <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">Your list is empty</h3>
      <p class="text-gray-500 dark:text-gray-400 mt-1">Add items above to start your shopping list.</p>
    </div>

    <div *ngIf="completedItems().length > 0" class="space-y-3 opacity-60">
      <h3 class="text-sm font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 ml-2">Checked Off ({{ completedItems().length }})</h3>
      
      <div *ngFor="let item of completedItems()" class="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-800/50 border border-transparent rounded-2xl group">
        <div class="flex items-center gap-4 flex-1 cursor-pointer" (click)="toggleItem(item)">
          <button class="text-accent">
            <lucide-icon [img]="icons.CheckCircle2" size="24"></lucide-icon>
          </button>
          <span class="text-lg text-gray-500 dark:text-gray-400 line-through capitalize">{{ item.name }}</span>
        </div>
        <button (click)="deleteItem(item.id)" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg opacity-0 group-hover:opacity-100 transition-all">
          <lucide-icon [img]="icons.Trash2" size="18"></lucide-icon>
        </button>
      </div>
    </div>

  </div>
</div>
