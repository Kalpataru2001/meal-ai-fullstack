<div class="min-h-screen flex items-center justify-center p-4 bg-background-light dark:bg-background-dark">
  <div class="w-full max-w-md bg-card-light dark:bg-card-dark rounded-3xl p-8 shadow-xl border border-gray-200 dark:border-gray-800 animate-fade-in">
    
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-accent/10 rounded-full flex items-center justify-center mx-auto mb-4 text-accent">
        <lucide-icon [img]="icons.KeyRound" size="32"></lucide-icon>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Reset Password</h1>
      <p class="text-gray-500 dark:text-gray-400 mt-2">Enter your new secure password below.</p>
    </div>

    <div *ngIf="errorMessage()" class="p-4 mb-6 text-sm text-red-700 bg-red-100 border border-red-400 rounded-xl dark:bg-red-900/30 dark:text-red-400 dark:border-red-800">
      {{ errorMessage() }}
    </div>
    <div *ngIf="successMessage()" class="p-4 mb-6 text-sm text-emerald-700 bg-emerald-100 border border-emerald-400 rounded-xl dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800 font-bold">
      {{ successMessage() }}
    </div>

    <form [formGroup]="updateForm" (ngSubmit)="updatePassword()" class="space-y-6">
      
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">New Password</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
            <lucide-icon [img]="icons.Lock" size="18"></lucide-icon>
          </div>
          <input type="password" formControlName="password"
            class="block w-full pl-11 pr-4 py-3 border border-gray-200 dark:border-gray-700 rounded-xl bg-gray-50 dark:bg-gray-800/50 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none"
            placeholder="Min. 6 characters">
        </div>
      </div>

      <button type="submit" [disabled]="updateForm.invalid || isLoading()"
        class="w-full flex items-center justify-center gap-2 py-3 px-4 bg-accent text-white rounded-xl font-bold shadow-lg shadow-accent/30 hover:bg-accent/90 hover:scale-[1.02] transition-all disabled:opacity-50 disabled:hover:scale-100">
        <lucide-icon *ngIf="isLoading()" [img]="icons.Loader2" size="20" class="animate-spin"></lucide-icon>
        {{ isLoading() ? 'Updating...' : 'Update Password' }}
      </button>

    </form>
  </div>
</div>
