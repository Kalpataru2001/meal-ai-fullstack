<div class="flex min-h-screen items-center justify-center bg-background-light dark:bg-background-dark p-4">
  
  <div class="w-full max-w-md bg-card-light dark:bg-card-dark rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800 p-8 transition-colors duration-300">
    
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-2">Create Account</h1>
      
      <div class="flex items-center gap-2 mt-4">
        <div class="h-2 flex-1 rounded-full transition-colors duration-300" [ngClass]="currentStep() >= 1 ? 'bg-accent' : 'bg-gray-200 dark:bg-gray-700'"></div>
        <div class="h-2 flex-1 rounded-full transition-colors duration-300" [ngClass]="currentStep() >= 2 ? 'bg-accent' : 'bg-gray-200 dark:bg-gray-700'"></div>
        <div class="h-2 flex-1 rounded-full transition-colors duration-300" [ngClass]="currentStep() === 3 ? 'bg-accent' : 'bg-gray-200 dark:bg-gray-700'"></div>
      </div>
      <p class="text-xs text-gray-500 dark:text-gray-400 mt-2 text-right">Step {{ currentStep() }} of 3</p>
    </div>

    <div *ngIf="errorMessage()" class="mb-6 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-red-600 dark:text-red-400 text-sm">
      {{ errorMessage() }}
    </div>

    <form *ngIf="!isSuccess()" [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div *ngIf="currentStep() === 1" formGroupName="credentials" class="space-y-5 animate-fade-in">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Full Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              <lucide-icon [img]="icons.User" size="18"></lucide-icon>
            </div>
            <input type="text" formControlName="name" class="block w-full pl-10 pr-3 py-2 border border-gray-200 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800/50 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-accent outline-none" placeholder="John Doe">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              <lucide-icon [img]="icons.Mail" size="18"></lucide-icon>
            </div>
            <input type="email" formControlName="email" class="block w-full pl-10 pr-3 py-2 border border-gray-200 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800/50 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-accent outline-none" placeholder="you@example.com">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              <lucide-icon [img]="icons.Lock" size="18"></lucide-icon>
            </div>
            <input type="password" formControlName="password" class="block w-full pl-10 pr-3 py-2 border border-gray-200 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800/50 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-accent outline-none" placeholder="••••••••">
          </div>
        </div>
      </div>

      <div *ngIf="currentStep() === 2" formGroupName="personal" class="space-y-5 animate-fade-in">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Age</label>
            <input type="number" formControlName="age" class="block w-full px-3 py-2 border border-gray-200 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800/50 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-accent outline-none" placeholder="e.g. 28">
          </div>
          <div></div> </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Weight (kg)</label>
            <input type="number" formControlName="weight" class="block w-full px-3 py-2 border border-gray-200 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800/50 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-accent outline-none" placeholder="e.g. 70">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Height (cm)</label>
            <input type="number" formControlName="height" class="block w-full px-3 py-2 border border-gray-200 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800/50 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-accent outline-none" placeholder="e.g. 175">
          </div>
        </div>
      </div>

      <div *ngIf="currentStep() === 3" formGroupName="preferences" class="space-y-6 animate-fade-in">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Primary Diet</label>
          <select formControlName="diet_type" class="block w-full px-3 py-2 border border-gray-200 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800/50 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-accent outline-none">
            <option *ngFor="let diet of dietTypes" [value]="diet">{{ diet }}</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Allergies (Optional)</label>
          <div class="flex flex-wrap gap-2">
            <button 
              *ngFor="let allergy of availableAllergies" 
              type="button"
              (click)="toggleSelection('allergies', allergy)"
              class="px-3 py-1.5 rounded-full text-xs font-medium border transition-colors"
              [ngClass]="isSelected('allergies', allergy) 
                ? 'bg-accent border-accent text-white' 
                : 'bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:border-accent'">
              {{ allergy }}
            </button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Favorite Cuisines</label>
          <div class="flex flex-wrap gap-2">
           <button 
              *ngFor="let cuisine of availableCuisines" 
              type="button"
              (click)="toggleSelection('cuisine_prefs', cuisine)"
              class="px-3 py-1.5 rounded-full text-xs font-medium border transition-colors"
              [ngClass]="isSelected('cuisine_prefs', cuisine) 
                ? 'bg-accent border-accent text-white' 
                : 'bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:border-accent'">
              {{ cuisine }}
            </button>
          </div>
        </div>
      </div>

      <div class="flex gap-3 pt-4">
        <button 
          *ngIf="currentStep() > 1" 
          type="button" 
          (click)="prevStep()"
          class="flex items-center justify-center px-4 py-2.5 border border-gray-200 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
          <lucide-icon [img]="icons.ChevronLeft" size="18" class="mr-1"></lucide-icon>
          Back
        </button>

        <button 
          *ngIf="currentStep() < 3" 
          type="button" 
          (click)="nextStep()"
          [disabled]="(currentStep() === 1 && credentialsForm.invalid) || (currentStep() === 2 && personalForm.invalid)"
          class="flex-1 flex items-center justify-center py-2.5 px-4 border border-transparent rounded-lg text-sm font-medium text-white bg-accent hover:bg-accent/90 focus:ring-2 focus:ring-offset-2 focus:ring-accent disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          Next Step
          <lucide-icon [img]="icons.ChevronRight" size="18" class="ml-1"></lucide-icon>
        </button>

        <button 
          *ngIf="currentStep() === 3" 
          type="submit" 
          [disabled]="registerForm.invalid || isLoading()"
          class="flex-1 flex items-center justify-center py-2.5 px-4 border border-transparent rounded-lg text-sm font-medium text-white bg-accent hover:bg-accent/90 focus:ring-2 focus:ring-offset-2 focus:ring-accent disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          <span *ngIf="!isLoading()">Complete Setup</span>
          <lucide-icon *ngIf="isLoading()" [img]="icons.Loader2" class="animate-spin" size="20"></lucide-icon>
        </button>
      </div>

    </form>

    <div *ngIf="isSuccess()" class="text-center py-8 animate-fade-in">
      <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-green-100 dark:bg-green-900/30 mb-6">
        <lucide-icon [img]="icons.Check" size="32" class="text-green-600 dark:text-green-400"></lucide-icon>
      </div>
      <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100 mb-2">Check your email!</h2>
      <p class="text-sm text-gray-600 dark:text-gray-400 mb-8">
        We've sent a confirmation link to your email address. Please click the link to activate your account.
      </p>
      <a routerLink="/login" class="inline-flex justify-center py-2.5 px-6 border border-transparent rounded-lg text-sm font-medium text-white bg-accent hover:bg-accent/90 transition-colors">
        Back to Login
      </a>
    </div>

    <p class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
      Already have an account? 
      <a routerLink="/login" class="font-medium text-accent hover:text-accent/80 transition-colors">Log in</a>
    </p>

  </div>
</div>
